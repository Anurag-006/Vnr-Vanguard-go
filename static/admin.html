<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanguard Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #00ff00; font-family: 'JetBrains Mono', monospace; padding: 40px; }
        .dashboard { max-width: 800px; margin: 0 auto; border: 1px solid #333; padding: 30px; border-radius: 8px; background: #0a0a0a; }
        h1 { border-bottom: 1px dashed #333; padding-bottom: 10px; margin-top: 0; }
        .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .metric-card { background: #111; padding: 20px; border-radius: 6px; border: 1px solid #222; }
        .metric-value { font-size: 2rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .metric-label { color: #888; font-size: 0.85rem; text-transform: uppercase; }
        
        button { background: #ff003c; color: white; border: none; padding: 15px 30px; font-family: inherit; font-weight: bold; font-size: 1rem; border-radius: 4px; cursor: pointer; transition: 0.2s; width: 100%; }
        button:hover { background: #cc0030; }
        .log-box { margin-top: 20px; padding: 15px; background: #000; border: 1px solid #333; color: #aaa; font-size: 0.85rem; height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="dashboard">
    <h1>[VANGUARD] // SYSTEM_STATUS</h1>
    
    <div class="metric-grid">
        <div class="metric-card">
            <div id="ui-ram" class="metric-value">--</div>
            <div class="metric-label">Active RAM (MB)</div>
        </div>
        <div class="metric-card">
            <div id="ui-goroutines" class="metric-value">--</div>
            <div class="metric-label">Active Goroutines</div>
        </div>
        <div class="metric-card">
            <div id="ui-cache" class="metric-value">--</div>
            <div class="metric-label">Batches Cached</div>
        </div>
    </div>

    <button onclick="flushCache()">INITIATE SYSTEM FLUSH</button>

    <div id="consoleLog" class="log-box">System initialized. Awaiting commands...</div>
</div>

<script>
    const logBox = document.getElementById('consoleLog');
    
    function log(msg) {
        logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML;
    }

    async function fetchStatus() {
        try {
            const res = await fetch('/api/admin/status');
            if (res.status === 401) {
                log("ERROR: Unauthorized. Did you cancel the password prompt?");
                return;
            }
            const data = await res.json();
            
            document.getElementById('ui-ram').innerText = data.memory.active_ram_mb;
            document.getElementById('ui-goroutines').innerText = data.memory.goroutines;
            document.getElementById('ui-cache').innerText = data.cache.batches_stored;
            log("System metrics updated.");
        } catch (e) {
            log("Network error fetching status.");
        }
    }

    async function flushCache() {
        if (!confirm("Are you sure? This will wipe the RAM vault and force the engine to re-scrape the college portal.")) return;
        
        try {
            const res = await fetch('/api/admin/flush', { method: 'POST' });
            const data = await res.json();
            log(data.message || "Flush complete.");
            fetchStatus();
        } catch (e) {
            log("ERROR: Flush failed.");
        }
    }

    // Refresh status every 5 seconds
    fetchStatus();
    setInterval(fetchStatus, 5000);
</script>
</body>
</html>
