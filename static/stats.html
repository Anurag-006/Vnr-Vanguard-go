<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Class Statistics | Vanguard</title>
    <style>
        body { background: #050810; color: #f8fafc; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: #111827; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        h1 { margin:0 0 5px 0; font-size: 3rem; color: #38bdf8; }
        p { color: #94a3b8; margin: 0; text-transform: uppercase; font-size: 0.8rem; font-weight: bold;}
    </style>
</head>
<body>
    <h2 style="text-align: center; margin-bottom: 40px;">Academic Analytics</h2>
    <div id="statsGrid" class="grid">Loading...</div>

<script>
    const params = new URLSearchParams(window.location.search);
fetch(`/api/v1/stats?section=${params.get('section')}&year=${params.get('year')}&exam=${params.get('exam')}`)
        .then(r => r.json())
        .then(data => {
            if(data.error) {
                document.getElementById('statsGrid').innerHTML = `<p style="color:red;">${data.error}</p>`;
                return;
            }
            
            document.getElementById('statsGrid').innerHTML = `
                <div class="card"><h1>${data.avg_sgpa}</h1><p>Avg SGPA (Valid Only)</p></div>
                <div class="card"><h1 style="color:#10b981;">${data.pass_percentage}%</h1><p>Pass Rate</p></div>
                <div class="card"><h1>${data.passed} / ${data.valid_count}</h1><p>Pass/Fail Split</p></div>
                <div class="card"><h1 style="color:#ef4444;">${data.withheld_count}</h1><p>Results Withheld</p></div>
            `;
        });
</script>
</body>
</html>
