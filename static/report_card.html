<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcript | VNR Vanguard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161b2c;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.2); /* Added the missing glow variable */
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .report-container {
            width: 100%;
            max-width: 850px; 
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        
        .back-link:hover { opacity: 0.8; }

        /* --- Profile Card --- */
        .profile-card {
            background: var(--surface);
            border-radius: 32px;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .info h1 { font-size: 2rem; margin: 0; letter-spacing: -1px; }
        .info p { color: var(--text-dim); margin: 5px 0 0 0; font-size: 1.1rem; }

        .sgpa-circle {
            width: 100px;
            height: 100px;
            border: 4px solid var(--accent);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .sgpa-circle span { font-size: 1.8rem; font-weight: 800; color: var(--accent); }
        .sgpa-circle label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }

        /* --- Subject Table --- */
        .subject-card {
            background: var(--surface);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 20px; color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; background: rgba(255, 255, 255, 0.02); }
        td { padding: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .grade-badge {
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            min-width: 25px;
            text-align: center;
        }

        .point-badge {
            font-weight: 600;
            color: var(--accent);
            font-family: monospace;
            font-size: 1rem;
        }

        .result-pass { color: var(--success); font-weight: 700; }
        .result-fail { color: var(--danger); font-weight: 700; }

        /* --- Loader States --- */
        #loader {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
            font-size: 1.2rem;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .profile-card { flex-direction: column; text-align: center; gap: 20px; }
            th, td { padding: 15px 10px; }
        }
    </style>
</head>
<body>

<div class="report-container">
    <a href="javascript:history.back()" class="back-link">← Back to Leaderboard</a>

    <div id="loader">Fetching Data from Vanguard Engine...</div>

    <div id="report-content" style="display: none;">
        <div class="profile-card">
            <div class="info">
                <p>VNR Vignana Jyothi Institute</p>
                <h1 id="ui-name">Loading...</h1>
                <p>Roll No: <span id="ui-roll"></span></p>
                <p id="ui-verdict" style="font-size: 0.9rem; margin-top: 10px; font-weight: 600;"></p>
            </div>
            <div class="sgpa-circle">
                <span id="ui-sgpa">-</span>
                <label>SGPA</label>
            </div>
        </div>

        <div class="subject-card">
            <table>
                <thead>
                    <tr>
                        <th>Subject Name</th>
                        <th>Grade</th>
                        <th>GP</th> 
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="ui-table-body">
                    </tbody>
            </table>
        </div>

        <p style="text-align: center; color: var(--text-dim); margin-top: 30px; font-size: 0.8rem;">
            Disclaimer: This is an automated summary generated for reference only.
        </p>
    </div>
</div>

<script src="/js/report.js"></script>
</body>
</html>
